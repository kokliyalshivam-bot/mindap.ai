<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindMap AI</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f0f2f5;
    height:100vh;
}

.container{
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
}

.header{
    background:#0066ff;
    color:white;
    text-align:center;
    padding:15px;
}

.header h1{
    font-size:28px;
}

.chatbox{
    flex:1;
    overflow-y:auto;
    padding:15px;
    background:#f7f7f7;
}

.user{
    text-align:right;
    margin:10px 0;
}

.bot{
    text-align:left;
    margin:10px 0;
}

.message{
    display:inline-block;
    padding:12px;
    border-radius:15px;
    max-width:75%;
}

.user .message{
    background:#0066ff;
    color:white;
}

.bot .message{
    background:#e4e6eb;
    color:black;
}

.input-area{
    display:flex;
    background:white;
    border-top:1px solid #ccc;
}

input{
    flex:1;
    padding:15px;
    border:none;
    outline:none;
    font-size:16px;
}

button{
    padding:15px 20px;
    border:none;
    background:#0066ff;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#0052cc;
}

</style>
</head>
<body>

<div class="container">

<div class="header">
<h1>MindMap AI 🤖</h1>
<p>Your Smart Assistant</p>
</div>

<div class="chatbox" id="chatbox">

<div class="bot">
<div class="message">
Hello! I am MindMap AI. Ask me anything.
</div>
</div>

</div>

<div class="input-area">
<input type="text" id="userInput" placeholder="Type your question...">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script>

const knowledge = {

"hello":"Hello! How can I help you?",
"hi":"Hi! Nice to meet you.",
"how are you":"I am fine. Thanks for asking.",
"your name":"My name is MindMap AI.",
"who are you":"I am MindMap AI, your assistant.",
"who made you":"I was created by Shivam.",

"capital of india":"New Delhi is the capital of India.",
"capital of france":"Paris is the capital of France.",
"capital of japan":"Tokyo is the capital of Japan.",

"what is ai":"AI stands for Artificial Intelligence.",
"what is computer":"A computer is an electronic machine.",
"what is html":"HTML is used to create web pages.",
"what is css":"CSS is used to design websites.",
"what is javascript":"JavaScript makes websites interactive.",

"what is science":"Science is the study of nature and the universe.",
"what is physics":"Physics studies matter and energy.",
"what is chemistry":"Chemistry studies substances and reactions.",
"what is biology":"Biology studies living organisms.",

"what is water":"Water is H2O.",
"what is gravity":"Gravity attracts objects toward Earth.",
"who discovered gravity":"Isaac Newton discovered gravity.",

"what is earth":"Earth is the third planet from the Sun.",
"what is moon":"The Moon is Earth's natural satellite.",
"largest planet":"Jupiter is the largest planet.",
"red planet":"Mars is known as the Red Planet.",

"2+2":"4",
"5+5":"10",
"10*10":"100",
"100/10":"10",

"what is bca":"BCA stands for Bachelor of Computer Applications.",
"what is mca":"MCA stands for Master of Computer Applications.",

"motivate me":"Never give up. Keep learning every day.",
"bye":"Goodbye! Have a great day."
};

function sendMessage(){

let input = document.getElementById("userInput");
let text = input.value.trim();

if(text === "") return;

let chatbox = document.getElementById("chatbox");

chatbox.innerHTML += `
<div class="user">
<div class="message">${text}</div>
</div>
`;

let msg = text.toLowerCase();
let reply = "Sorry, I don't know the answer yet.";

for(let key in knowledge){
    if(msg.includes(key)){
        reply = knowledge[key];
        break;
    }
}

setTimeout(() => {

chatbox.innerHTML += `
<div class="bot">
<div class="message">${reply}</div>
</div>
`;

chatbox.scrollTop = chatbox.scrollHeight;

},500);

input.value = "";
}

document.getElementById("userInput").addEventListener("keypress",function(e){
    if(e.key === "Enter"){
        sendMessage();
    }
});

</script>

</body>
</html>
